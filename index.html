    <link rel="modulepreload" crossorigin href="/wedding-template-kit/assets/three.module-Dpv066-i.js">
    <link rel="stylesheet" crossorigin href="/wedding-template-kit/assets/index-CK3PRCGe.css">
  </head>
  <body>
    <div id="cursor" aria-hidden="true"></div>
    <div id="preloader">
      <div class="preloader-ring-wrap">
        <svg class="preloader-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle class="preloader-track" cx="50" cy="50" r="38" />
          <circle class="preloader-progress" id="preloader-arc" cx="50" cy="50" r="38" />
        </svg>
        <p class="preloader-text">Y &amp; Y</p>
      </div>
    </div>
    <div id="hero-spacer"></div>
    <nav id="site-nav">
      <div class="nav-logo">Y & Y</div>
      <button id="nav-burger" type="button" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="#section-path">Story</a></li>
        <li><a href="#section-glimpse">Gallery</a></li>
        <li><a href="#section-destination">Details</a></li>
      </ul>
    </nav>
    <main id="main">
    <div id="hero-overlay" class="hero-overlay" role="banner">
      <div class="hero-overlay__inner">
        <p class="hero-tagline">YOU ARE INVITED TO OUR WEDDING</p>
        <div id="hero-names" class="hero-names" aria-label="Names">
          <span class="hero-names__part">Your Name</span>
          <span class="hero-names__amp">&amp;</span>
          <span class="hero-names__part">Partner Name</span>
        </div>
        <div class="hero-bottom">
          <p class="hero-date">08 · 08 · 2026</p>
          <div id="countdown">
            <div class="cd-unit">
              <span class="cd-num" id="cd-days">000</span>
              <span class="cd-label">days</span>
            </div>
            <div class="cd-unit">
              <span class="cd-num" id="cd-hours">00</span>
              <span class="cd-label">hours</span>
            </div>
            <div class="cd-unit">
              <span class="cd-num" id="cd-minutes">00</span>
              <span class="cd-label">minutes</span>
            </div>
          </div>
        </div>
        <div class="hero-scroll-indicator" aria-hidden="true"></div>
      </div>
    </div>

    <div class="section-divider" aria-hidden="true"></div>

    <section id="section-path" aria-label="Story">
      <div class="path-container">
        <div class="golden-thread" aria-hidden="true"></div>
        <p class="path-text path-text-1">Two stories...</p>
        <p class="path-text path-text-2">...become one</p>
      </div>
    </section>

    <div class="section-divider" aria-hidden="true"></div>

    <section id="section-glimpse" aria-label="Gallery">
      <div class="glimpse-pin-container">
        <p class="glimpse-label">Our story</p>
        <div class="glimpse-expand-mask">
          <img src="/wedding-template-kit/photos/scroll/1.webp" class="glimpse-img glimpse-img-1" alt="" />
          <img src="/wedding-template-kit/photos/scroll/2.webp" class="glimpse-img glimpse-img-2" alt="" />
          <img src="/wedding-template-kit/photos/scroll/3.webp" class="glimpse-img glimpse-img-3" alt="" />
        </div>
        <div class="glimpse-action">
          <button id="btn-open-gallery" class="editorial-btn">View full gallery</button>
        </div>
      </div>
    </section>

    <div class="section-divider" aria-hidden="true"></div>

    <section id="section-destination" aria-label="Details">
      <div class="destination-content">
        <p class="dest-date">August 08, 2026</p>
        <h2 class="dest-title">Your Venue Name</h2>
        <p class="dest-address">Your full address</p>
        <a
          href="https://maps.google.com"
          class="route-link"
          rel="noopener noreferrer"
          >Open map</a>
        <button id="btn-reveal-rsvp" class="editorial-btn" type="button">Confirm attendance</button>
        <form id="rsvp-form" class="rsvp-form" style="display: none;">
          <input
            type="text"
            id="rsvp-company"
            name="company"
            class="rsvp-honeypot"
            tabindex="-1"
            autocomplete="off"
            aria-hidden="true"
          />
          <input
            type="text"
            id="rsvp-name"
            class="rsvp-input"
            placeholder="Your full name"
            required
          />
          <div class="rsvp-options">
            <label class="rsvp-radio-label">
              <input type="radio" name="attendance" value="Yes" checked />
              <span class="radio-custom"></span> Happy to attend
            </label>
            <label class="rsvp-radio-label">
              <input type="radio" name="attendance" value="No" />
              <span class="radio-custom"></span> Sorry, cannot attend
            </label>
          </div>
          <button type="submit" class="editorial-btn submit-btn">Send RSVP</button>
          <p id="rsvp-status" class="rsvp-status"></p>
        </form>
      </div>
    </section>

    <div class="section-divider" aria-hidden="true"></div>

    <section id="section-final" aria-label="Final and RSVP">
      <div class="final-content">
        <p class="final-date">08 · 08 · 2026</p>
        <p class="final-tagline">See you soon</p>
      </div>
    </section>

    <div id="gallery-overlay" class="gallery-overlay" aria-hidden="true" aria-label="Gallery">
      <button id="btn-close-gallery" class="editorial-btn gallery-close-btn" tabindex="-1">Close</button>
      <span id="gallery-counter" class="gallery-counter" aria-live="polite">01 / 24</span>
    </div>
    </main>

  </body>
</html>
